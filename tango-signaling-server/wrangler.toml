name = "tango-signaling-server"
main = "src/index.ts"
compatibility_date = "2026-05-11"

[[durable_objects.bindings]]
name = "MATCHMAKING"
class_name = "MatchmakingSession"

[[durable_objects.bindings]]
name = "SESSION_REGISTRY"
class_name = "SessionRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchmakingSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SessionRegistry"]
