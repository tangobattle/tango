syntax = "proto3";

package tango.lobby;

// ---- shared types ----

message MatchType {
  uint32 mode = 1;
  uint32 subtype = 2;
}

message GameInfo {
  string family = 1;            // e.g. "bn6"
  uint32 variant = 2;
  message Patch {
    string name = 1;
    string version = 2;         // semver
  }
  optional Patch patch = 3;
}

// Match settings. Same type doubles as RosterEntry.now_playing.
message MatchProposal {
  MatchType match_type = 1;
  GameInfo game_info = 2;
  bool blind_setup = 3;
}

// A visible player in the roster.
//
// friend_code is the raw 75-bit identifier as 10 bytes big-endian, derived
// server-side from the verified mTLS fingerprint. The Crockford-Base32 + Verhoeff
// "friendly" form is purely a client-side rendering/input concern.
//
// now_playing present  <=> in a match (IN_MATCH); absent <=> ONLINE.
// Invisible/offline users are simply absent from the roster.
message RosterEntry {
  bytes friend_code = 1;
  optional MatchProposal now_playing = 2;
}

// A STUN or TURN server. A credential-less entry is plain STUN; if TURN
// provisioning fails the server falls back to hardcoded public STUN servers,
// so a match's ice_servers is never empty.
message IceServer {
  repeated string urls = 1;
  optional string username = 2;
  optional string credential = 3;
}

// Presence status, shared by Join and the set_status message. Declarative FULL
// state, stored wholesale by the server. Visibility and activity are
// independent so a visibility change never disturbs an in-match state (and you
// can be hidden AND in a match):
//   - invisible: hidden from everyone else's roster (indistinguishable from
//     offline). Absent/false = visible.
//   - now_playing: the match the client is in (direct, or maintained for a
//     lobby match). A challenge in flight is NOT reported here — the server
//     derives that busy from its own pending-challenge state.
message Status {
  bool invisible = 1;
  optional MatchProposal now_playing = 2;
}

// ---- client -> server ----

message ClientMessage {
  // Sent once, first, on connect. Establishes presence with an initial status.
  // status carries now_playing when a client reconnects mid-match (last-
  // connection-wins takeover), so it never flickers ONLINE in the roster.
  message Join {
    uint32 protocol_version = 1;
    Status status = 2;
  }

  // Propose a match to peer_friend_code. Carries the match settings AND the
  // commitment (the 16-byte hash), lifted out of the p2p control channel.
  //
  // At most one pending challenge per (challenger, target) pair, so the peer
  // friend code alone identifies it: re-sending just overwrites the pending
  // entry and the target gets a fresh ChallengeIncoming that supersedes the
  // prior one. No challenge id is needed.
  message Challenge {
    bytes peer_friend_code = 1;
    MatchProposal proposal = 2;
    bytes commitment = 3;
  }

  // Accept the current challenge from peer_friend_code, with own settings +
  // commitment. The server consummates whatever's pending for this peer; a
  // racing stale accept (peer already superseded) is caught downstream by the
  // p2p commitment mismatch, so no id is needed to reject it here.
  message ChallengeAccept {
    bytes peer_friend_code = 1;
    MatchProposal proposal = 2;
    bytes commitment = 3;
  }

  // Actively reject the current incoming challenge from peer_friend_code.
  message ChallengeDecline {
    bytes peer_friend_code = 1;
  }

  // Withdraw our outgoing challenge to peer_friend_code (target gets
  // ChallengeWithdrawn).
  message ChallengeCancel {
    bytes peer_friend_code = 1;
  }

  // WebRTC SDP, routed to the peer for the in-flight match (challenger is the
  // offerer, accepter the answerer).
  message RtcOffer {
    bytes peer_friend_code = 1;
    string sdp = 2;
  }
  message RtcAnswer {
    bytes peer_friend_code = 1;
    string sdp = 2;
  }

  message Ping {}

  oneof which {
    Join join = 1;
    Status set_status = 2;
    Challenge challenge = 3;
    ChallengeAccept challenge_accept = 4;
    ChallengeDecline challenge_decline = 5;
    ChallengeCancel challenge_cancel = 6;
    RtcOffer rtc_offer = 7;
    RtcAnswer rtc_answer = 8;
    Ping ping = 9;
  }
}

// ---- server -> client ----

message ServerMessage {
  // Reply to Join: your authoritative friend code + roster snapshot. No ICE
  // servers here — they're provisioned only once a match is confirmed (see
  // ChallengeAccepted / ChallengeConfirmed), so a connect or a spammed
  // challenge can't mint TURN credentials.
  message Welcome {
    bytes your_friend_code = 1;
    repeated RosterEntry roster = 2;
    uint32 protocol_version = 3;
  }

  // Roster delta. Upsert = arrival OR status/now_playing change (the client
  // infers arrival-vs-update from whether friend_code is already local, for
  // entrance animation). Leave = removal (also covers disconnect / go-invisible,
  // and tears down any pending challenge involving that friend code).
  message RosterUpsert { RosterEntry entry = 1; }
  message RosterLeave { bytes friend_code = 1; }

  // Delivered to the challenged identity. No ICE servers — those wait for the
  // accept. A fresh ChallengeIncoming from a peer supersedes any prior one from
  // that same peer (whether the proposal or just the commitment changed).
  message ChallengeIncoming {
    bytes peer_friend_code = 1;
    MatchProposal proposal = 2;
    bytes commitment = 3;
  }

  // To the challenger once the peer accepts: their settings + commitment, plus
  // fresh TURN creds (both sides are now committed, so ICE is provisioned).
  // The challenger is the offerer.
  message ChallengeAccepted {
    bytes peer_friend_code = 1;
    MatchProposal proposal = 2;
    bytes commitment = 3;
    repeated IceServer ice_servers = 4;
  }

  // To the accepter, the symmetric partner of ChallengeAccepted: confirms the
  // accept landed and carries its fresh TURN creds. The accepter is the
  // answerer and gathers candidates while it awaits the RtcOffer.
  message ChallengeConfirmed {
    bytes peer_friend_code = 1;
    repeated IceServer ice_servers = 2;
  }

  // To the challenger: the peer actively declined. (A peer that merely ignores
  // produces no message; the challenger times out client-side, which is what
  // makes invisible indistinguishable from offline.)
  message ChallengeDeclined {
    bytes peer_friend_code = 1;
  }

  // To the target: the pending challenge from peer_friend_code is dead —
  // withdrawn via ChallengeCancel or because the challenger went away. Clears
  // the toast. (A superseding proposal arrives as a fresh ChallengeIncoming
  // instead, so this is only for genuine teardown.)
  message ChallengeWithdrawn {
    bytes peer_friend_code = 1;
  }

  // Relayed SDP from the peer.
  message RtcOffer {
    bytes peer_friend_code = 1;
    string sdp = 2;
  }
  message RtcAnswer {
    bytes peer_friend_code = 1;
    string sdp = 2;
  }

  // A newer connection for your identity took over; this socket is closing.
  message Displaced {}

  message Pong {}

  oneof which {
    Welcome welcome = 1;
    RosterUpsert roster_upsert = 2;
    RosterLeave roster_leave = 3;
    ChallengeIncoming challenge_incoming = 4;
    ChallengeAccepted challenge_accepted = 5;
    ChallengeConfirmed challenge_confirmed = 6;
    ChallengeDeclined challenge_declined = 7;
    ChallengeWithdrawn challenge_withdrawn = 8;
    RtcOffer rtc_offer = 9;
    RtcAnswer rtc_answer = 10;
    Displaced displaced = 11;
    Pong pong = 12;
  }
}
