syntax = "proto3";

package tango.replay.protos.replay11;

message Metadata {
  message GameInfo {
    message Patch {
      string name = 1;
      string version = 2;
    }
    string rom_family = 1;
    uint32 rom_variant = 2;
    Patch patch = 3;
  }

  message Side {
    string nickname = 1;
    GameInfo game_info = 2;
    bool reveal_setup = 3;
    // SHA-256 fingerprint (raw digest bytes) of this side's persistent mTLS
    // client certificate — the install identity presented to the matchmaking
    // server. The recorder fills its own side from its own certificate and
    // the remote side from the server-attested value relayed during
    // signaling; like everything else in this metadata, it's recorded on the
    // recorder's honor. Empty when unknown: direct connections, no
    // certificate presented, or a recorder that predates the field.
    bytes client_cert_fingerprint_sha256 = 4;
  }

  uint64 ts = 1;
  string link_code = 2;
  Side local_side = 3;
  Side remote_side = 4;
  // Field 5 was a `round` index, never populated to anything useful —
  // replays already cover all rounds of a match, so the field was
  // always zero and just confused the UI. Reserved so future schema
  // additions don't collide on the wire.
  reserved 5;
  uint32 match_type = 6;
  uint32 match_subtype = 7;
}
