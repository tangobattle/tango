[package]
edition = "2024"
rust-version = "1.85.0"
name = "str0m"
version = "0.21.0"
authors = [
    "Martin Algesten <martin@algesten.se>",
    "Hugo Tunius <h@tunius.se>",
    "Davide Bertola <dade@dadeb.it>",
]
build = false
exclude = [
    "/cargo_deny.sh",
    "/deny.toml",
    "/run-fuzz.sh",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "WebRTC library in Sans-IO style"
readme = "README.md"
keywords = [
    "webrtc",
    "streaming",
    "video",
    "audio",
    "media",
]
categories = [
    "web-programming",
    "multimedia",
    "network-programming",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/algesten/str0m"

[features]
_internal_dont_use_log_stats = []
_internal_test_exports = [
    "str0m-proto/_internal_test_exports",
    "is/_internal_test_exports",
]
apple-crypto = ["dep:str0m-apple-crypto"]
aws-lc-rs = ["dep:str0m-aws-lc-rs"]
default = ["aws-lc-rs"]
drv = ["dep:drv"]
openssl = ["dep:str0m-openssl"]
