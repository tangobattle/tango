name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Resolve the pushed tag back to its annotated message (if any).
      # Lightweight tags have no message; the release body falls back to
      # empty in that case, matching what `gh release create` would do.
      - id: tag-msg
        run: |
          git fetch --tags --force
          msg=$(git for-each-ref --format='%(contents)' refs/tags/${{ github.ref_name }})
          {
            echo 'msg<<TANGO_TAG_MSG_EOF'
            echo "$msg"
            echo 'TANGO_TAG_MSG_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.tag-msg.outputs.msg }}
          # Semver prereleases carry a `-` after the version number
          # (e.g. v1.0.0-alpha.0, v5.0.0-beta.3); a plain `v1.2.3`
          # never contains `-`, so tag-name search is a clean check.
          prerelease: ${{ contains(github.ref_name, '-') }}

  release-win32-x64:
    runs-on: windows-2022
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      # `gamesupport` is a private submodule; the PAT authenticates its
      # checkout (the public mgba / libdatachannel submodules don't need
      # it). The token is used over HTTPS, so the submodule URLs are
      # HTTPS — see .gitmodules.
      - uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.GAMESUPPORT_REPO_PAT }}

      - run: git fetch --tags --force

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: win32-x64-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Source MSVC vcvars (cl.exe / link.exe / nmake.exe / Windows SDK)
      # into the rest of the workflow so cmake + cc-rs all pick up the
      # same MSVC toolset.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Python build deps
        run: pip install semver==3.0.0-dev3 toml mako

      - name: Build
        shell: bash
        run: ./win/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./dist/tango-x86_64-windows.exe

  release-mac-universal:
    runs-on: macos-14
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      # `gamesupport` is a private submodule; the PAT authenticates its
      # checkout (the public mgba / libdatachannel submodules don't need
      # it). The token is used over HTTPS, so the submodule URLs are
      # HTTPS — see .gitmodules.
      - uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.GAMESUPPORT_REPO_PAT }}

      - run: git fetch --tags --force

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: darwin-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      # using venv to avoid: "The directory '/Users/runner/Library/Caches/pip' or its parent directory is not owned or is not writable by the current user"
      - name: Build
        run: |
          python3 -m venv ./macos/venv
          source ./macos/venv/bin/activate
          python3 -m pip install semver==3.0.0-dev3 toml dmgbuild pyobjc-framework-Quartz mako
          ./macos/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./dist/tango-macos.dmg

  release-linux-x86_64:
    # Pin to Ubuntu 22.04 so the produced binary links against an older glibc
    # and stays runnable on the broadest spread of user distributions.
    runs-on: ubuntu-22.04
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      # `gamesupport` is a private submodule; the PAT authenticates its
      # checkout (the public mgba / libdatachannel submodules don't need
      # it). The token is used over HTTPS, so the submodule URLs are
      # HTTPS — see .gitmodules.
      - uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.GAMESUPPORT_REPO_PAT }}

      - run: git fetch --tags --force

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Install Python build deps
        run: sudo pip3 install semver==3.0.0-dev3 toml mako

      - name: Install system packages
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y alsa build-essential clang cmake curl fuse git libnss3 librust-atk-dev librust-gdk-pixbuf-dev librust-gdk-sys-dev librust-pango-dev libsdl2-dev pkgconf sudo wget

      - name: Build
        run: ./linux/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./dist/tango-x86_64-linux.AppImage
