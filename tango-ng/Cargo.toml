[package]
name = "tango-ng"
version = "0.0.0"
edition = "2021"
license = "AGPL-3.0-or-later"
publish = false

[[bin]]
name = "tango-ng"
path = "src/main.rs"

[dependencies]
iced = { version = "0.13", features = ["tokio", "image-without-codecs", "markdown"] }
image = "0.25"
tiny-skia = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
semver = { version = "1", features = ["serde"] }
regex = "1"
mailparse = "0.14"
open = "5"
bps = { path = "../bps" }
mgba = { path = "../mgba" }
tango-pvp = { path = "../tango-pvp" }
tango-filesync = { path = "../tango-filesync" }
rand = "0.8"
rand_pcg = { version = "0.3", features = ["serde1"] }
cpal = "0.16"
bytemuck = "1"
thiserror = "1"
chrono = "0.4"
itertools = "0.13"
steamlocate = "2"
zip = "0.6"
reqwest = { version = "0.11", features = ["stream", "json", "rustls-tls"], default-features = false }
tokio = { version = "1", features = ["fs", "io-util", "time", "rt"] }
tokio-util = { version = "0.7", features = ["io"] }
futures = "0.3"
fluent-templates = "0.8"
unic-langid = { version = "0.9", features = ["likelysubtags"] }
tango-gamedb = { path = "../tango-gamedb" }
tango-dataview = { path = "../tango-dataview" }
walkdir = "2"
directories-next = "2"
parking_lot = "0.12"
log = "0.4"
env_logger = "0.9"
anyhow = "1"
indexmap = "2"

[lints]
workspace = true
